name: Footnote
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "9"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    PROVISIONING_PROFILE_SPECIFIER: "footnote appstore"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Footnote:
    type: application
    platform: iOS
    sources:
      - path: Footnote
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.footnote
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Footnote/Info.plist
        CODE_SIGN_ENTITLEMENTS: Footnote/Footnote.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FootnoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FootnoteTests
      - path: Footnote.storekit
    dependencies:
      - target: Footnote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.footnote.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FootnoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FootnoteUITests
    dependencies:
      - target: Footnote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.footnote.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Footnote:
    build:
      targets:
        Footnote: all
        FootnoteTests: [test]
        FootnoteUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Footnote.storekit
    test:
      config: Debug
      storeKitConfiguration: Footnote.storekit
      targets:
        - FootnoteTests
        - FootnoteUITests
    archive:
      config: Release
