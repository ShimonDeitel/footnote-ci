name: Release to App Store

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    env:
      APP_NAME: Footnote
      SCHEME: Footnote
      BUNDLE_ID: com.shimondeitel.footnote
      TEAM_ID: W7Q885Q59C
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          sed -i '' "s|__OPENROUTER_KEY__|${OPENROUTER_KEY}|g" Footnote/AIClient.swift
          echo "key present: $(grep -c 'sk-or-v1' Footnote/AIClient.swift)"

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -version -sdk iphoneos ProductBuildVersion || true
          sw_vers

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "ci" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "ci" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci" "$KEYCHAIN"
          security find-identity -p codesigning -v "$KEYCHAIN"

      - name: Prepare App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_KEY_BASE64" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo -n "$ASC_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/asc.p8"

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/asc.p8" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/export.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>method</key><string>app-store-connect</string>
          <key>teamID</key><string>$TEAM_ID</string>
          <key>signingStyle</key><string>automatic</string>
          <key>destination</key><string>export</string>
          <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/export.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/asc.p8"
          ls -la "$RUNNER_TEMP/export"

      - name: Verify embedded SDK
        run: |
          IPA=$(ls "$RUNNER_TEMP/export/"*.ipa | head -1)
          rm -rf "$RUNNER_TEMP/v" && mkdir -p "$RUNNER_TEMP/v" && cd "$RUNNER_TEMP/v" && unzip -q "$IPA"
          plutil -extract DTSDKBuild raw "Payload/$APP_NAME.app/Info.plist" || true
          plutil -extract DTXcode raw "Payload/$APP_NAME.app/Info.plist" || true

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(ls "$RUNNER_TEMP/export/"*.ipa | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
